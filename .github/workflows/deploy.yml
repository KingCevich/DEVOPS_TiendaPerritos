name: CI/CD - Build, Push & Deploy a EKS


on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ECR_FRONTEND_REPO: tienda-frontend
  ECR_BACKEND_REPO: tienda-backend
  ECR_DB_REPO: tienda-db

jobs:
  build-and-deploy:
    name: Build, Push y Deploy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout del repositorio
        uses: actions/checkout@v4


      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}


      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2


      - name: Obtener Account ID y construir ECR_URL
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_URL=${ACCOUNT_ID}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> "$GITHUB_OUTPUT"


      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"


      - name: Build & Push Frontend
        run: |
          docker build -t ${{ env.ECR_FRONTEND_REPO }} ./frontend
          docker tag ${{ env.ECR_FRONTEND_REPO }}:latest ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_FRONTEND_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_FRONTEND_REPO }}:${{ env.IMAGE_TAG }}


      - name: Build & Push Backend
        run: |
          docker build -t ${{ env.ECR_BACKEND_REPO }} ./backend
          docker tag ${{ env.ECR_BACKEND_REPO }}:latest ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_BACKEND_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_BACKEND_REPO }}:${{ env.IMAGE_TAG }}


      - name: Build & Push DB
        run: |
          docker build -t ${{ env.ECR_DB_REPO }} ./db
          docker tag ${{ env.ECR_DB_REPO }}:latest ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_DB_REPO }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_DB_REPO }}:${{ env.IMAGE_TAG }}

      # Configura kubectl para apuntar al cluster EKS
      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}


      - name: Inyectar ECR_URL en manifests
        run: |
          find ./k8s -type f -name "*.yaml" -exec sed -i \
            "s|{{ECR_URL}}|${{ steps.account.outputs.ECR_URL }}|g" {} \;
      
      - name: Crear Secret MySQL desde GitHub Secrets
        run: |
          kubectl apply -f ./k8s/namespace.yaml
          kubectl create secret generic mysql-secret \
            --from-literal=MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -n ${{ secrets.EKS_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy de manifests base en EKS
        run: |
          kubectl apply -f ./k8s/namespace.yaml
          kubectl apply -f ./k8s/mysql-secret.yaml
          kubectl apply -f ./k8s/mysql-deployment.yaml
          kubectl apply -f ./k8s/mysql-service.yaml
          kubectl apply -f ./k8s/backend-deployment.yaml
          kubectl apply -f ./k8s/backend-service.yaml
          kubectl apply -f ./k8s/backend-hpa.yaml
          kubectl apply -f ./k8s/frontend-deployment.yaml
          kubectl apply -f ./k8s/frontend-service.yaml
          kubectl apply -f ./k8s/frontend-hpa.yaml

      - name: Escalar a minimo antes del rollout
        run: |
          kubectl scale deployment/tienda-backend --replicas=2 \
            -n ${{ secrets.EKS_NAMESPACE }}
          kubectl scale deployment/tienda-frontend --replicas=2 \
            -n ${{ secrets.EKS_NAMESPACE }}
          sleep 15
          
      - name: Actualizar imagenes en EKS (tag por commit)
        run: |
          kubectl set image deployment/tienda-backend \
            backend=${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_BACKEND_REPO }}:${{ env.IMAGE_TAG }} \
            -n ${{ secrets.EKS_NAMESPACE }}
          kubectl set image deployment/tienda-frontend \
            frontend=${{ steps.account.outputs.ECR_URL }}/${{ env.ECR_FRONTEND_REPO }}:${{ env.IMAGE_TAG }} \
            -n ${{ secrets.EKS_NAMESPACE }}
          kubectl rollout status deployment/tienda-backend -n ${{ secrets.EKS_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/tienda-frontend -n ${{ secrets.EKS_NAMESPACE }} --timeout=180s


      - name: Mostrar resultado del deploy
        run: |
          echo "===================================="
          echo "Pods en namespace ${{ secrets.EKS_NAMESPACE }}:"
          kubectl get pods -n ${{ secrets.EKS_NAMESPACE }}
          echo ""
          echo "HPA en namespace ${{ secrets.EKS_NAMESPACE }}:"
          kubectl get hpa -n ${{ secrets.EKS_NAMESPACE }}
          echo ""
          HOSTNAME=$(kubectl get svc tienda-frontend -n ${{ secrets.EKS_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "APLICACION DISPONIBLE EN: http://${HOSTNAME}"
          echo "===================================="